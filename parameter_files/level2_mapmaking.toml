# Iterative destriper settings
# Number of outer destriper iterations (1 = standard single-pass destriper)
n_destriper_iterations = 1

# Planck prior: stabilizes large angular scales by replacing low spatial-frequency
# modes in the sky estimate with Planck 30 GHz data between iterations.
# The prior only guides the offset solution — the final map is purely COMAP data.
use_planck_prior = false
# Mixing parameter: 0.0 = disabled, 1.0 = full Planck on large scales
prior_mixing_alpha = 0.5
# Smoothing FWHM (degrees) for scale separation between COMAP and Planck
prior_smoothing_fwhm_deg = 0.5

# Save convergence diagnostic plot (offset norm + sky change vs iteration)
plot_convergence = true

